<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyLingo — Aprende Python</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s,transform .1s}
button:hover{opacity:.86}
button:active{transform:scale(.97)}
textarea{font-family:'DM Mono',monospace;resize:vertical}
textarea:focus{outline:none}
pre{font-family:'DM Mono',monospace}
.fade{animation:fadeIn .3s ease}
.pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}
.slide{animation:slideUp .28s ease both}
.brillo{animation:brillo .65s ease}
.shake{animation:shake .38s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.82);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
@keyframes brillo{0%,100%{box-shadow:0 0 0 0 #22c55e44}50%{box-shadow:0 0 0 10px #22c55e00}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes xpFloat{0%{opacity:0;transform:translateY(0)}20%{opacity:1;transform:translateY(-6px)}80%{opacity:1}100%{opacity:0;transform:translateY(-52px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.xp-float{position:absolute;left:50%;top:-4px;transform:translateX(-50%);font-size:14px;font-weight:700;color:#16a34a;animation:xpFloat 1.4s ease forwards;pointer-events:none;white-space:nowrap}
.pulse{animation:pulse 2s ease infinite}
#sidebar{width:225px;flex-shrink:0}
#main-area{flex:1;min-width:0}
.lock-item{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 22px;opacity:0.4}
</style>
</head>
<body>

<!-- HEADER -->
<header id="header" style="background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50;box-shadow:0 1px 6px #0000000d">
  <div style="max-width:1280px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;gap:14px">
    <button onclick="toggleSidebar()" style="background:none;border:none;color:#94a3b8;font-size:20px;padding:2px 6px;border-radius:6px">☰</button>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#2563eb,#1e40af);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px #2563eb44">🐍</div>
      <span style="font-weight:700;font-size:17px;color:#0f172a;letter-spacing:-.5px">Py<span style="color:#2563eb">Lingo</span></span>
    </div>
    <div style="flex:1;display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden">
        <div id="progress-bar" style="width:0%;height:100%;background:linear-gradient(90deg,#2563eb,#2563ebcc);border-radius:99px;transition:width .5s ease"></div>
      </div>
      <span id="progress-text" style="font-size:12px;font-weight:600;color:#64748b;white-space:nowrap">0/32</span>
    </div>
    <div id="streak-badge" style="display:none;align-items:center;gap:4px;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:20px;padding:3px 11px;flex-shrink:0">
      <span>🔥</span><span id="streak-num" style="font-size:13px;font-weight:700;color:#ea580c">0</span>
    </div>
    <div id="xp-badge" style="display:none;background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:20px;padding:3px 11px;flex-shrink:0">
      <span id="xp-num" style="font-size:13px;font-weight:700;color:#2563eb">⭐ 0 XP</span>
    </div>
    <button onclick="resetProgress()" title="Reiniciar progreso" style="background:none;border:1px solid #e2e8f0;color:#94a3b8;font-size:11px;padding:3px 8px;border-radius:6px;flex-shrink:0">↺ Reset</button>
    <button id="exam-btn" onclick="startExam()" style="display:none;padding:6px 16px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:20px;color:#fff;font-weight:700;font-size:12.5px;flex-shrink:0;box-shadow:0 4px 12px #7c3aed44" class="pulse">🎓 Examen Final</button>
  </div>
</header>

<!-- LAYOUT -->
<div style="max-width:1280px;margin:0 auto;padding:20px;display:flex;gap:18px" id="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;position:sticky;top:70px">
      <div style="padding:11px 14px;border-bottom:1px solid #f1f5f9"><span style="font-size:10.5px;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase">Bloques</span></div>
      <div id="sidebar-content" style="max-height:calc(100vh - 140px);overflow-y:auto"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main-area">
    <div id="course-view"></div>
    <div id="exam-view" style="display:none"></div>
    <div id="finish-view" style="display:none"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATOS Y ESTADO
// ═══════════════════════════════════════════════════════════════
const STARTER = '# Escribe tu código aquí\n';
const INTENTOS_SOL = 4;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const norm = s => s.trim().split('\n').map(l => l.trimEnd()).join('\n');

let STATE = {
  idx: 0,
  code: STARTER,
  done: {},
  streak: 0,
  tries: {},
  panel: 'explicacion',
  hint: false,
  result: null,
  sidebarOpen: true,
  vista: 'curso', // 'curso' | 'examen' | 'completado'
};

let CURRICULO = [];
let BLOQUES = [];
let EXAM_QUESTIONS = [];
let EXAM_STATE = { idx: 0, code: STARTER, aprobadas: [], tries: {}, result: null, hint: false };

// ═══════════════════════════════════════════════════════════════
// GENERADORES DE EJERCICIOS
// ═══════════════════════════════════════════════════════════════
function gen1a() {
  const datos = [
    {nombre:'Carlos',edad:28,ciudad:'Madrid'},{nombre:'María',edad:22,ciudad:'Barcelona'},
    {nombre:'Lucas',edad:31,ciudad:'Valencia'},{nombre:'Sofía',edad:25,ciudad:'Bilbao'},
    {nombre:'Alejandro',edad:34,ciudad:'Málaga'},{nombre:'Elena',edad:27,ciudad:'Zaragoza'},
  ];
  const d = pick(datos);
  const expected = `Hola, soy ${d.nombre}, tengo ${d.edad} años y vivo en ${d.ciudad}.`;
  return {id:'1a',titulo:'Tarjeta de presentación',
    task:`Crea una presentación personal en Python.\n\nUsa variables para guardar tu nombre ("${d.nombre}"), tu edad (${d.edad}) y tu ciudad ("${d.ciudad}"), e imprímelas en una sola línea usando un f-string.`,
    pista:`Declara las tres variables y usa un f-string: print(f"...{'{nombre}'}...{'{edad}'}...")`,
    expected,
    validator:(s)=>s.includes(d.nombre) && s.includes(String(d.edad)) && s.includes(d.ciudad),
    solution:`nombre = "${d.nombre}"\nedad = ${d.edad}\nciudad = "${d.ciudad}"\nprint(f"Hola, soy {nombre}, tengo {edad} años y vivo en {ciudad}.")`,starter:STARTER};
}
function gen1b() {
  const items = [{producto:'Teclado',precio:49.99,cantidad:3},{producto:'Auriculares',precio:29.99,cantidad:2},{producto:'Ratón',precio:19.99,cantidad:4},{producto:'Webcam',precio:59.99,cantidad:3}];
  const a = pick(items);
  const total = Math.round(a.precio * a.cantidad * 100) / 100;
  return {id:'1b',titulo:'Recibo de compra',
    task:`Tienes un producto llamado "${a.producto}" con un precio unitario de ${a.precio}€ y una cantidad de ${a.cantidad} unidades.\n\nGuarda esos datos en variables, calcula el precio total e imprímelo todo con formato claro.`,
    pista:'El total es precio * cantidad. Guárdalo en una variable y usa un f-string.',
    expected:`Producto: ${a.producto} | Precio unitario: ${a.precio}€ | Total: ${total}€`,
    validator:(s)=>s.includes(String(total)),
    solution:`producto = "${a.producto}"\nprecio = ${a.precio}\ncantidad = ${a.cantidad}\ntotal = precio * cantidad\nprint(f"Producto: {producto} | Precio unitario: {precio}€ | Total: {total}€")`,starter:STARTER};
}
function gen1c() {
  const c = pick([0,20,37,50,100,25]);
  const f = c * 9 / 5 + 32;
  return {id:'1c',titulo:'Conversor de temperatura',
    task:`Convierte ${c}°C a Fahrenheit y muestra el resultado en pantalla.\n\nGuarda la temperatura en una variable y aplica esta fórmula:\n\n  Fahrenheit = Celsius × 9/5 + 32`,
    pista:'Guarda celsius en una variable, calcula fahrenheit con la fórmula (C * 9/5 + 32) y usa un f-string con el símbolo °.',
    expected:`${c}°C equivalen a ${f}°F`,
    validator:(s)=>s.includes(String(f)),
    solution:`celsius = ${c}\nfahrenheit = celsius * 9/5 + 32\nprint(f"{celsius}°C equivalen a {fahrenheit}°F")`,starter:STARTER};
}
function gen1p() {
  const empleados = [{nombre:'Carlos Ruiz',puesto:'Desarrollador',salario:2800,exp:4},{nombre:'Ana Gómez',puesto:'Diseñadora UX',salario:2500,exp:3},{nombre:'Marcos León',puesto:'Analista de datos',salario:3100,exp:6},{nombre:'Lucía Pardo',puesto:'DevOps Engineer',salario:3400,exp:5}];
  const e = pick(empleados);
  return {id:'1p',titulo:'🏗️ Proyecto: Ficha de empleado',esProyecto:true,
    task:`Crea una ficha de empleado para ${e.nombre}, que trabaja como ${e.puesto}, cobra ${e.salario}€/mes y tiene ${e.exp} años de experiencia.\n\nUsa variables para cada dato e imprímelo en dos líneas: una con el nombre y puesto, otra con el salario y la experiencia.`,
    pista:'Necesitas dos print(). Primero nombre y puesto, luego salario y experiencia.',
    expected:`Empleado: ${e.nombre} -- ${e.puesto}\nSalario: ${e.salario}€/mes | Experiencia: ${e.exp} años`,
    validator:(s)=>s.includes(String(e.salario)) && s.includes(e.nombre),
    solution:`nombre = "${e.nombre}"\npuesto = "${e.puesto}"\nsalario = ${e.salario}\nexp = ${e.exp}\nprint(f"Empleado: {nombre} -- {puesto}")\nprint(f"Salario: {salario}€/mes | Experiencia: {exp} años")`,starter:STARTER};
}
function gen2a() {
  const casos = [{item:'huevos',total:247,caja:12},{item:'naranjas',total:185,caja:8},{item:'botellas',total:310,caja:24},{item:'libros',total:134,caja:9}];
  const sc = pick(casos);
  const cajas = Math.floor(sc.total / sc.caja);
  const sobran = sc.total % sc.caja;
  const cap = sc.item[0].toUpperCase() + sc.item.slice(1);
  return {id:'3a',titulo:'División con resto',
    task:`Tienes ${sc.total} ${sc.item} para empaquetar en cajas de ${sc.caja}.\n\nCalcula cuántas cajas completas puedes llenar y cuántos ${sc.item} sobran. Imprime ambos resultados.`,
    pista:'Usa // para la división entera y % para el resto.',
    expected:`Cajas completas: ${cajas}\n${cap} sobrantes: ${sobran}`,
    solution:`total = ${sc.total}\npor_caja = ${sc.caja}\nprint(f"Cajas completas: {total // por_caja}")\nprint(f"${cap} sobrantes: {total % por_caja}")`,starter:STARTER};
}
function gen2p() {
  const c = pick([{precio:120,pct:25},{precio:80,pct:10},{precio:200,pct:30},{precio:150,pct:20}]);
  const desc = c.precio * c.pct / 100;
  return {id:'3p',titulo:'🏗️ Proyecto: Calculadora de descuentos',esProyecto:true,
    task:`Un artículo cuesta ${c.precio}€ y tiene un descuento del ${c.pct}%.\n\nCalcula el importe del descuento y el precio final. Imprime ambos resultados.`,
    pista:'El descuento es precio * porcentaje / 100. El precio final es precio menos el descuento.',
    expected:`Descuento aplicado: ${desc}€\nPrecio final: ${c.precio - desc}€`,
    validator:(s)=>s.includes(String(c.precio - desc)),
    solution:`precio = ${c.precio}\ndescuento_pct = ${c.pct}\ndescuento = precio * descuento_pct / 100\nprecio_final = precio - descuento\nprint(f"Descuento aplicado: {descuento}€")\nprint(f"Precio final: {precio_final}€")`,starter:STARTER};
}
function gen3a() {
  const n = pick([{val:9.5,res:'Matrícula'},{val:8.0,res:'Notable'},{val:7.5,res:'Notable'},{val:6.5,res:'Bien'},{val:5.5,res:'Aprobado'},{val:4.0,res:'Suspenso'}]);
  return {id:'4a',titulo:'Clasificador de notas',
    task:`nota = ${n.val}\n\nClasifica la nota con if/elif/else e imprime la calificación correspondiente:\n· Matrícula si nota >= 9\n· Notable si nota >= 7\n· Bien si nota >= 6\n· Aprobado si nota >= 5\n· Suspenso en cualquier otro caso`,
    pista:'Usa if/elif/else ordenando las condiciones de mayor a menor.',
    expected:n.res,
    solution:`nota = ${n.val}\nif nota >= 9:\n    print("Matrícula")\nelif nota >= 7:\n    print("Notable")\nelif nota >= 6:\n    print("Bien")\nelif nota >= 5:\n    print("Aprobado")\nelse:\n    print("Suspenso")`,starter:STARTER};
}
function gen3b() {
  const e = pick([{edad:3,res:'gratis'},{edad:7,res:'8€'},{edad:12,res:'8€'},{edad:18,res:'15€'},{edad:45,res:'15€'},{edad:65,res:'7€'}]);
  return {id:'4b',titulo:'Calculadora de tarifas',
    task:`Un parque cobra según la edad:\n  · Menores de 5 años: gratis\n  · De 5 a 12 años: 8€\n  · De 13 a 64 años: 15€\n  · 65 años o más: 7€\n\nedad = ${e.edad}\n\nImprime la tarifa que corresponde.`,
    pista:'Usa if/elif/else. Puedes usar elif 5 <= edad <= 12 para rangos.',
    expected:`Tarifa: ${e.res}`,
    solution:`edad = ${e.edad}\nif edad < 5:\n    print("Tarifa: gratis")\nelif edad <= 12:\n    print("Tarifa: 8€")\nelif edad <= 64:\n    print("Tarifa: 15€")\nelse:\n    print("Tarifa: 7€")`,starter:STARTER};
}
function gen3p() {
  const c = pick([{saldo:500,retiro:200},{saldo:300,retiro:150},{saldo:1000,retiro:400}]);
  return {id:'4p',titulo:'🏗️ Proyecto: Cajero automático',esProyecto:true,
    task:`saldo = ${c.saldo}\nretiro = ${c.retiro}\npin_correcto = True\n\nSimula un cajero que comprueba:\n1. Si el PIN no es correcto → avisa\n2. Si el retiro supera el saldo → avisa\n3. Si todo está bien → descuenta e informa del nuevo saldo`,
    pista:'if not pin_correcto → primera condición. elif retiro > saldo → segunda. else → ejecuta el retiro.',
    expected:`Retiro de ${c.retiro}€ realizado. Nuevo saldo: ${c.saldo - c.retiro}€`,
    validator:(s)=>s.includes(String(c.saldo - c.retiro)),
    solution:`saldo = ${c.saldo}\nretiro = ${c.retiro}\npin_correcto = True\nif not pin_correcto:\n    print("PIN incorrecto")\nelif retiro > saldo:\n    print("Saldo insuficiente")\nelse:\n    saldo = saldo - retiro\n    print(f"Retiro de {retiro}€ realizado. Nuevo saldo: {saldo}€")`,starter:STARTER};
}
function gen4a() {
  const lim = pick([10,20,30,40,50]);
  let suma = 0; for (let i=2;i<=lim;i+=2) suma+=i;
  return {id:'5a',titulo:'Suma de pares',
    task:`Suma todos los números pares del 2 al ${lim} (incluido) usando un bucle for.\n\nImprime la suma total al final.`,
    pista:`Usa range(2, ${lim+1}, 2) para generar solo los pares. Acumula la suma empezando en 0.`,
    expected:`Suma de pares del 2 al ${lim}: ${suma}`,
    validator:(s)=>s.includes(String(suma)),
    solution:`suma = 0\nfor i in range(2, ${lim+1}, 2):\n    suma += i\nprint(f"Suma de pares del 2 al ${lim}: {suma}")`,starter:STARTER};
}
function gen4b() {
  const desde = pick([3,5,7,10]);
  const nums = Array.from({length:desde},(_,i)=>String(desde-i)).join('\n');
  return {id:'5b',titulo:'Cuenta atrás',
    task:`Usa un bucle while para contar hacia atrás desde ${desde} hasta 1.\nCada número en su propia línea.\nAl terminar imprime: ¡Despegue!`,
    pista:`Empieza con contador = ${desde}. Dentro del bucle: imprime y resta 1. El mensaje va FUERA del bucle.`,
    expected:`${nums}\n¡Despegue!`,
    solution:`contador = ${desde}\nwhile contador >= 1:\n    print(contador)\n    contador -= 1\nprint("¡Despegue!")`,starter:STARTER};
}
function gen5a() {
  const precio = pick([50,100,200,80,120]);
  return {id:'6a',titulo:'Calculadora de IVA',
    task:`Define una función que calcule el precio con IVA dado un precio base. El IVA por defecto debe ser del 21%.\n\nLlámala con ${precio}€ e imprime el resultado.`,
    pista:'Usa return para devolver el resultado. El parámetro iva tiene valor por defecto 21.',
    expected:`Precio con IVA (21%): ${precio * 1.21}€`,
    validator:(s)=>s.includes(String(precio * 1.21)),
    solution:`def calcular_precio_iva(precio, iva=21):\n    return precio * (1 + iva / 100)\nresultado = calcular_precio_iva(${precio})\nprint(f"Precio con IVA (21%): {resultado}€")`,starter:STARTER};
}
function gen7p() {
  const grupos = [
    {'María':[8,7,9,6,8],'Pedro':[5,4,6,5,7],'Sofía':[9,10,8,9,10]},
    {'Lucas':[7,8,6,9,7],'Elena':[4,5,3,6,4],'Diego':[10,9,8,9,10]},
    {'Carla':[6,5,7,6,8],'Rubén':[8,9,7,8,9],'Nuria':[5,4,6,5,5]},
  ];
  const g = pick(grupos);
  let mejorNombre='',mejorMedia=0;
  const lineas = Object.entries(g).map(([nombre,notas])=>{
    const media=Math.round(10*notas.reduce((a,b)=>a+b,0)/notas.length)/10;
    const estado=media>=5?'Aprobado':'Suspenso';
    if(media>mejorMedia){mejorMedia=media;mejorNombre=nombre;}
    return `${nombre} → Media: ${media} | ${estado}`;
  });
  lineas.push(`Mejor alumno: ${mejorNombre}`);
  const dictStr=Object.entries(g).map(([n,ns])=>`"${n}": ${JSON.stringify(ns)}`).join(', ');
  const taskDict=Object.entries(g).map(([n,ns])=>`    "${n}": ${JSON.stringify(ns)}`).join(',\n');
  return {id:'8p',titulo:'🏗️ Proyecto: Sistema de calificaciones',esProyecto:true,
    task:`alumnos = {\n${taskDict}\n}\n\nCalcula la media de cada alumno (redondeada a 1 decimal) e indica si está aprobado o suspenso. Al final muestra quién tiene la mejor media.`,
    pista:'Recorre alumnos.items(). Usa sum(notas)/len(notas) y round(...,1). Guarda el mejor mientras iteras.',
    expected:lineas.join('\n'),
    solution:`alumnos = {${dictStr}}\nmejor_nombre = ""\nmejor_media = 0\nfor nombre, notas in alumnos.items():\n    media = round(sum(notas) / len(notas), 1)\n    estado = "Aprobado" if media >= 5 else "Suspenso"\n    print(f"{nombre} → Media: {media} | {estado}")\n    if media > mejor_media:\n        mejor_media = media\n        mejor_nombre = nombre\nprint(f"Mejor alumno: {mejor_nombre}")`,starter:STARTER};
}

    {id:2,titulo:'Variables',emoji:'📦',color:'#0891b2',
      explicacion:`Una variable es como una cajita con nombre donde guardas información para usarla después.

  nombre = "Ana"
  edad = 25
  print(nombre)   → Ana
  print(edad)     → 25

El símbolo = guarda el valor en la variable. No es "igual" matemático, es "guardar en".

Hay cuatro tipos básicos de datos:
  nombre = "Ana"      # texto (string) → siempre entre comillas
  edad   = 25         # número entero (int)
  altura = 1.75       # número decimal (float)
  activo = True       # verdadero o falso (bool)

Los f-strings son la forma más cómoda de mezclar texto y variables en un print(). Pon una f antes de las comillas y mete las variables entre llaves {}:

  nombre = "Ana"
  edad = 25
  print(f"Me llamo {nombre} y tengo {edad} años")
  → Me llamo Ana y tengo 25 años

Puedes hacer operaciones con las variables directamente:
  precio = 10
  cantidad = 3
  print(precio * cantidad)   → 30`,

    {id:3,titulo:'Operadores y Tipos',emoji:'🔢',color:'#7c3aed',
      explicacion:`Además de sumar y restar, hay dos operadores que sorprenden al principio:

  //  división entera -- se queda solo con los enteros, sin decimales
      17 // 5  →  3  (cuántas veces cabe el 5 en el 17)

  %   módulo -- devuelve el RESTO de la división
      17 % 5   →  2  (17 = 5×3 + 2, ese 2 es el resto)
      Truco: si n % 2 == 0, el número es par.

  **  potencia
      2 ** 8   →  256

Operadores de comparación -- devuelven True o False:
  ==  igual       !=  distinto
  >   mayor       <   menor
  >=  mayor o igual   <=  menor o igual

Operadores lógicos para combinar condiciones:
  and  →  True solo si LOS DOS son True
  or   →  True si al menos UNO es True
  not  →  invierte (True→False, False→True)

Conversión de tipos -- a veces necesitas cambiar el formato de un dato:
  int("42")     →  42     (texto a número entero)
  float("3.14") →  3.14   (texto a decimal)
  str(100)      →  "100"  (número a texto)`,

    {id:4,titulo:'Condicionales',emoji:'🔀',color:'#dc2626',
      explicacion:`Los condicionales le dan a tu programa la capacidad de tomar decisiones. Es como piensas tú cada día:

En Python:
  if llueve:

Puedes añadir más casos con elif (que significa "si no, ¿y si...?"):
  if nota >= 9:

  elif nota >= 5:
      print("Aprobado")

    {id:5,titulo:'Bucles',emoji:'🔁',color:'#16a34a',
      explicacion:`Los bucles sirven para repetir código sin escribirlo una y otra vez. Hay dos tipos:

------ FOR: cuando sabes cuántas veces repetir ------

  for i in range(5):
      print(i)
  → imprime 0, 1, 2, 3, 4

  range(1, 6)      → del 1 al 5 (el último no se incluye)
  range(0, 10, 2)  → 0, 2, 4, 6, 8  (de 2 en 2)

También puedes recorrer una lista directamente:
  for fruta in ["manzana", "pera", "naranja"]:
      print(fruta)

------ WHILE: cuando no sabes cuántas veces, solo la condición ------

  contador = 0
  while contador < 5:
      print(contador)
      contador += 1   ← ¡IMPORTANTE! Si no cambias la variable, el bucle no para nunca

------ Acumuladores: ir sumando resultados en un bucle ------

  suma = 0
  for i in range(1, 6):
      suma += i     ← es lo mismo que suma = suma + i
  print(suma)  →  15`,

    {id:6,titulo:'Funciones',emoji:'⚙️',color:'#0891b2',
      explicacion:`Una función es como una receta que escribes una vez y puedes usar cuantas veces quieras. En lugar de repetir el mismo código, lo metes en una función y la llamas por su nombre.

  def saludar(nombre):
      return f"¡Hola, {nombre}!"

  print(saludar("Ana"))    →  ¡Hola, Ana!
  print(saludar("Carlos")) →  ¡Hola, Carlos!

Las partes de una función:
  def        → la palabra clave para definirla
  nombre     → cómo la vas a llamar
  parámetros → los datos que le pasas (entre paréntesis)
  return     → el resultado que devuelve

Puedes poner valores por defecto en los parámetros:
  def potencia(base, exp=2):
      return base ** exp

  potencia(3)     →  9   (usa exp=2 por defecto)
  potencia(3, 3)  →  27  (ahora le pasas exp=3)

⚠️ Si la función no tiene return, no devuelve nada útil. Asegúrate de usarlo cuando necesites el resultado.`,

          solution:`def es_contrasena_segura(clave):\n    tiene_largo = len(clave) >= 8\n    tiene_numero = any(c.isdigit() for c in clave)\n    return tiene_largo and tiene_numero\nprint(f"Contraseña segura: {es_contrasena_segura('python123')}")`,starter:STARTER},

          solution:`def factorial(n):\n    if n == 0 or n == 1:\n        return 1\n    return n * factorial(n - 1)\nprint(f"5! = {factorial(5)}")`,starter:STARTER}],

    {id:7,titulo:'Listas y Tuplas',emoji:'📋',color:'#6d28d9',
      explicacion:`Una lista es como una bandeja con compartimentos: guarda varios valores en orden dentro de una sola variable.

  frutas = ["manzana", "pera", "naranja"]

Acceder a elementos (el índice empieza en 0, no en 1):
  frutas[0]   →  "manzana"           (el primero)
  frutas[-1]  →  "naranja"           (el último)
  frutas[0:2] →  ["manzana", "pera"] (del índice 0 al 1)

Modificar la lista:
  frutas.append("uva")    → añade al final
  frutas.remove("pera")   → elimina la primera que encuentre
  frutas.sort()           → ordena
  len(frutas)             → cuántos elementos tiene

Comprensión de listas -- una forma compacta de crear listas:
  cuadrados = [x**2 for x in range(1, 6)]
  →  [1, 4, 9, 16, 25]

  Solo los pares:
  pares = [x for x in range(10) if x % 2 == 0]
  →  [0, 2, 4, 6, 8]

Tuplas -- como listas, pero no se pueden modificar. Úsalas para datos fijos:
  punto = (40.41, -3.70)`,

    {id:8,titulo:'Diccionarios y Sets',emoji:'🗂️',color:'#0284c7',
      explicacion:`Un diccionario es como una agenda: cada entrada tiene un nombre (la clave) y un dato asociado (el valor).

  persona = {"nombre": "Ana", "edad": 25, "ciudad": "Madrid"}

Acceder a los datos:
  persona["nombre"]           →  "Ana"
  persona.get("email", "--")   →  "--"  (si no existe, devuelve el valor por defecto en lugar de dar error)

Recorrer un diccionario:
  for clave, valor in persona.items():
      print(f"{clave}: {valor}")

Métodos útiles:
  persona.keys()    → todas las claves
  persona.values()  → todos los valores
  persona.items()   → pares (clave, valor)

------ Sets: colecciones SIN duplicados ------

Un set es como una bolsa donde no puede haber dos cosas iguales. Perfecto para eliminar repeticiones:

  numeros = {1, 2, 2, 3, 3, 3}
  →  {1, 2, 3}   (los duplicados desaparecen solos)

  a = {1,2,3,4}   b = {3,4,5,6}
  a & b  →  {3,4}           (los que están en ambos)
  a | b  →  {1,2,3,4,5,6}  (todos juntos)
  a - b  →  {1,2}           (los de a que no están en b)`,

    {id:9,titulo:'Strings y Programas',emoji:'🚀',color:'#be185d',
      explicacion:`Los strings (textos) en Python tienen herramientas muy prácticas para manipularlos.

Las más usadas:
  "  hola  ".strip()       →  "hola"          (elimina espacios al principio y al final)
  "hola".upper()           →  "HOLA"           (todo en mayúsculas)
  "HOLA".lower()           →  "hola"           (todo en minúsculas)
  "hola mundo".replace("mundo", "Python")  →  "hola Python"
  "a,b,c".split(",")       →  ["a","b","c"]    (divide en lista)
  "hola".count("l")        →  2                (cuántas veces aparece algo)
  ", ".join(["a","b","c"]) →  "a, b, c"        (une una lista en texto)

Formato avanzado en f-strings -- para mostrar datos con precisión:
  f"{3.14159:.2f}"    →  "3.14"        (2 decimales)
  f"{precio:>10.2f}"  →  "      3.14"  (alineado a la derecha en 10 caracteres)
  f"{nombre:<10}"     →  "Ana       "  (alineado a la izquierda)
  f"{0.75:.0%}"       →  "75%"         (formato porcentaje)

Esto es muy útil cuando quieras mostrar tablas o informes con todo bien alineado.`,

          solution:`texto = "Python es el lenguaje del futuro y Python es genial"\nprint(f"Palabras: {len(texto.split())}")\nprint(f"Caracteres (sin espacios): {len(texto.replace(' ', ''))}")\nprint(f'Veces que aparece "Python": {texto.count("Python")}')\nprint(f"En mayúsculas: {texto.upper()}")`,starter:STARTER},
        {id:'9b',titulo:'Tabla formateada',
          task:`Tienes estos productos y precios:\n  Laptop → 899€\n  Ratón → 25€\n  Teclado → 45€\n\nMuestra una tabla alineada con separadores, precios con 2 decimales y el total al final.`,

function aplanar(bloques) {
  const lista = [];
  bloques.forEach(b => {
    b.ejercicios.forEach(e => lista.push({...e, bloque:b}));
    lista.push({...b.proyecto, bloque:b});
  });
  return lista;
}

        while(j<lines.length){const t=lines[j].trim();const ifM=t.match(/^(?:if|elif)\s+([\s\S]+):$/);
          if(ifM){j++;const body=[];while(j<lines.length&&(lines[j].trim()===''||getInd(lines[j])>indent)){if(lines[j].trim())body.push(lines[j].slice(indent+4));j++;}branches.push({cond:ifM[1],body});}
          else if(t==='else:'){j++;const body=[];while(j<lines.length&&(lines[j].trim()===''||getInd(lines[j])>indent)){if(lines[j].trim())body.push(lines[j].slice(indent+4));j++;}branches.push({cond:null,body});break;}
          else break;}
        for(const br of branches){if(br.cond===null||evalVal(br.cond,{...vars,...lv})){runBlock(br.body,lv);break;}}
        continue;
      }
      execLine(bt,lv); j++;
    }
  }
  runBlock(code.split('\n'),vars);
  return out.join('\n');
}

// ═══════════════════════════════════════════════════════════════
// LÓGICA DE DESBLOQUEO
// ═══════════════════════════════════════════════════════════════
function bloqueCompletado(bid) {
  return CURRICULO.filter(e=>e.bloque.id===bid).every(e=>STATE.done[e.id]);
}
function bloqueDesbloqueado(bid) {
  return bid===1 || bloqueCompletado(bid-1);
}
function todoCompletado() {
  return BLOQUES.every(b=>bloqueCompletado(b.id));
}

// ═══════════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function lineNums(code) {
  return code.split('\n').map((_,i)=>`<div style="font-size:12px;line-height:22px;padding:0 7px;color:#334155;font-family:'DM Mono',monospace">${i+1}</div>`).join('');
}

      <div style="display:flex">
        <div id="exam-line-nums" style="padding:12px 0;min-width:38px;background:#0b1120;border-right:1px solid #1e293b;text-align:right;user-select:none">${lineNums(EXAM_STATE.code)}</div>
        <textarea id="exam-editor" onkeydown="onExamKey(event)" oninput="onExamInput()" style="flex:1;padding:12px 16px;background:#0f172a;border:none;color:#e2e8f0;font-size:13.5px;line-height:22px;font-family:'DM Mono',monospace;resize:vertical;min-height:140px;caret-color:#a855f7"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button onclick="ejecutarExamen()" style="flex:1;padding:11px 0;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:11px;color:#fff;font-weight:700;font-size:14.5px">▶ Ejecutar</button>
      <button onclick="toggleExamHint()" style="padding:11px 16px;background:#fff;border:1.5px solid #e2e8f0;border-radius:11px;color:#475569;font-size:13px">💡 ${EXAM_STATE.hint?'Ocultar':'Pista'}</button>
    </div>`;

  if (EXAM_STATE.hint) {
    html += `<div style="background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:13px 16px;margin-bottom:12px"><p style="font-size:13.5px;color:#451a03;line-height:1.7">${esc(preg.pista)}</p></div>`;
  }

  if (triesN>0 && !EXAM_STATE.aprobadas.includes(EXAM_STATE.idx)) {
    html += `<div style="margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:4px;background:#f1f5f9;border-radius:99px;overflow:hidden">
        <div style="width:${Math.min(triesN/INTENTOS_SOL*100,100)}%;height:100%;background:${verSol?'#ef4444':'#f59e0b'};border-radius:99px;transition:width .4s"></div>
      </div>
      <span style="font-size:11px;color:#94a3b8;white-space:nowrap">${verSol?'Solución desbloqueada':`${triesN}/${INTENTOS_SOL} intentos`}</span>
    </div>`;
  }

  if (EXAM_STATE.result) {
    const r = EXAM_STATE.result;
    html += `<div class="pop" style="background:#fff;border:1.5px solid ${r.correcto?'#86efac':'#fca5a5'};border-radius:16px;padding:18px 20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:34px;height:34px;border-radius:50%;background:${r.correcto?'#dcfce7':'#fee2e2'};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${r.correcto?'✅':'❌'}</div>
        <p style="font-weight:700;font-size:14.5px;color:${r.correcto?'#16a34a':'#dc2626'}">${r.correcto?'¡Correcto!':'No es lo esperado, revísalo.'}</p>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div><p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">Tu salida</p>
          <pre style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:10px 12px;margin:0;font-size:12px;color:#1e293b;min-height:36px;white-space:pre-wrap">${esc(r.salida)||'(sin salida)'}</pre></div>
        <div><p style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">${r.correcto?'✓ Correcto':'Esperado'}</p>
          <pre style="background:${r.correcto?'#f0fdf4':'#f8fafc'};border:1px solid ${r.correcto?'#86efac':'#e2e8f0'};border-radius:9px;padding:10px 12px;margin:0;font-size:12px;color:${r.correcto?'#16a34a':'#1e293b'};min-height:36px;white-space:pre-wrap">${esc(preg.expected)}</pre></div>
      </div>
      ${!r.correcto&&verSol?`<div style="padding:12px 14px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;margin-bottom:12px">
        <p style="font-size:10px;font-weight:700;color:#0369a1;margin-bottom:6px;text-transform:uppercase">📖 Solución</p>
        <pre style="margin:0;font-size:12.5px;color:#0c4a6e;white-space:pre-wrap">${esc(preg.solution)}</pre>
      </div>`:''}
      <button onclick="siguienteExamen()" style="width:100%;padding:11px;background:${r.correcto?'linear-gradient(135deg,#16a34a,#15803d)':'linear-gradient(135deg,#7c3aed,#6d28d9)'};border:none;border-radius:11px;color:#fff;font-weight:700;font-size:14px">
        ${EXAM_STATE.idx<total-1?(r.correcto?'Siguiente pregunta →':'Pasar →'):'Ver resultado final →'}
      </button>
    </div>`;
  }

  html += '</div>';
  document.getElementById('exam-view').innerHTML = html;
  const ta = document.getElementById('exam-editor');
  if (ta) ta.value = EXAM_STATE.code;
}

// ═══════════════════════════════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════════════════════════════
function updateHeader() {
  const numDone = Object.keys(STATE.done).length;
  const total = CURRICULO.length;
  document.getElementById('progress-bar').style.width = `${Math.round(numDone/total*100)}%`;
  document.getElementById('progress-text').textContent = `${numDone}/${total}`;
  const streakBadge = document.getElementById('streak-badge');
  if (STATE.streak > 1) { streakBadge.style.display='flex'; document.getElementById('streak-num').textContent=STATE.streak; }
  else streakBadge.style.display='none';
  const xpBadge = document.getElementById('xp-badge');
  if (numDone > 0) { xpBadge.style.display='block'; document.getElementById('xp-num').textContent=`⭐ ${numDone*10} XP`; }
  else xpBadge.style.display='none';
  const examBtn = document.getElementById('exam-btn');
  if (examBtn) examBtn.style.display = todoCompletado() ? 'block' : 'none';
}

function goTo(i) {
  const oldBloque = CURRICULO[STATE.idx] ? CURRICULO[STATE.idx].bloque.id : null;
  const newBloque = CURRICULO[i] ? CURRICULO[i].bloque.id : null;
  // Only refresh if entering a DIFFERENT bloque AND it's not fully completed
  // (so completed bloques keep their values and checks, but new ones get fresh data)
  if (newBloque && newBloque !== oldBloque && !bloqueCompletado(newBloque)) {
    refreshBloque(newBloque);
  }
  STATE.idx = i; STATE.code = STARTER; STATE.result = null; STATE.hint = false; STATE.panel = 'explicacion';
  render();
}

function refreshBloque(bid) {
  // Rebuild exercises for this bloque with new random values
  const newBloques = buildCurriculo();
  const newBloque = newBloques.find(b => b.id === bid);
  const oldBloqueIdx = BLOQUES.findIndex(b => b.id === bid);
  if (!newBloque || oldBloqueIdx === -1) return;
  BLOQUES[oldBloqueIdx] = newBloque;
  CURRICULO = aplanar(BLOQUES);
}

function setPanel(p) { STATE.panel = p; renderCourse(); renderSidebar(); }
function toggleHint() { STATE.hint = !STATE.hint; renderCourse(); }
function resetCode() { STATE.code = STARTER; STATE.result = null; renderCourse(); }

function onCodeInput() {
  const ta = document.getElementById('code-editor');
  if (!ta) return;
  STATE.code = ta.value;
  document.getElementById('line-nums').innerHTML = lineNums(STATE.code);
}

function onEditorKey(e) {
  const ta = document.getElementById('code-editor');
  if (!ta) return;
  const ini = ta.selectionStart, fin = ta.selectionEnd, sel = ta.value.substring(ini,fin);
  if (e.key==='Tab') { e.preventDefault(); ta.setRangeText('    ',ini,fin,'end'); STATE.code=ta.value; document.getElementById('line-nums').innerHTML=lineNums(STATE.code); return; }
  if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') { e.preventDefault(); ejecutar(); return; }
  const PARES={'(':')','[':']','{':'}','"':'"',"'":"'"};
  const CIERRES=new Set([')',']','}']);
  if (sel.length>0&&PARES[e.key]) { e.preventDefault(); ta.setRangeText(e.key+sel+PARES[e.key],ini,fin,'select'); STATE.code=ta.value; return; }
  if (PARES[e.key]) { e.preventDefault(); if((e.key==='"'||e.key==="'")&&ta.value[ini]===e.key){ta.setSelectionRange(ini+1,ini+1);return;} ta.setRangeText(e.key+PARES[e.key],ini,fin,'preserve'); ta.setSelectionRange(ini+1,ini+1); STATE.code=ta.value; document.getElementById('line-nums').innerHTML=lineNums(STATE.code); return; }
  if (CIERRES.has(e.key)&&ta.value[ini]===e.key) { e.preventDefault(); ta.setSelectionRange(ini+1,ini+1); return; }
}

function ejecutar() {
  const ta = document.getElementById('code-editor');
  if (ta) STATE.code = ta.value;
  const ej = CURRICULO[STATE.idx];
  const salida = runPython(STATE.code);
  const correcto = ej.validator ? ej.validator(salida, STATE.code) : norm(salida) === norm(ej.expected);
  STATE.result = {salida, correcto, flexible: ej.validator && correcto};
  if (correcto) {
    if (!STATE.done[ej.id]) { STATE.done[ej.id]=true; showXP(); STATE.streak++; }
  } else {
    STATE.streak = 0;
    STATE.tries[ej.id] = (STATE.tries[ej.id]||0)+1;
  }
  saveState();
  updateHeader();
  renderSidebar();
  renderCourse();
  const ta2 = document.getElementById('code-editor');
  if (ta2) ta2.value = STATE.code;
}

function showXP() {
  setTimeout(()=>{
    const c = document.getElementById('xp-float-container');
    if (c) { c.innerHTML='<span class="xp-float">+10 XP ⭐</span>'; setTimeout(()=>{c.innerHTML='';},1400); }
  },50);
}

function otraVariante() {
  const ej = CURRICULO[STATE.idx];
  const bl = ej.bloque;
  const cands = CURRICULO.map((e,i)=>({e,i})).filter(({e,i})=>e.bloque.id===bl.id&&!e.esProyecto&&i!==STATE.idx);
  if (!cands.length) return;
  const noHechos = cands.filter(({e})=>!STATE.done[e.id]);
  goTo((noHechos.length?noHechos[0]:cands[0]).i);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  STATE.sidebarOpen = !STATE.sidebarOpen;
  sb.style.display = STATE.sidebarOpen ? 'block' : 'none';
}

// Examen
function startExam() {
  EXAM_QUESTIONS = buildExamen();
  EXAM_STATE = {idx:0, code:STARTER, aprobadas:[], tries:{}, result:null, hint:false};
  document.getElementById('course-view').style.display='none';
  document.getElementById('exam-view').style.display='block';
  document.getElementById('finish-view').style.display='none';
  renderExam();
}

function volverCurso() {
  document.getElementById('course-view').style.display='block';
  document.getElementById('exam-view').style.display='none';
  renderCourse();
}

function nuevoIntento() {
  EXAM_QUESTIONS = buildExamen();
  EXAM_STATE = {idx:0, code:STARTER, aprobadas:[], tries:{}, result:null, hint:false};
  renderExam();
}

function ejecutarExamen() {
  const ta = document.getElementById('exam-editor');
  if (ta) EXAM_STATE.code = ta.value;
  const preg = EXAM_QUESTIONS[EXAM_STATE.idx];
  const salida = runPython(EXAM_STATE.code);
  const correcto = preg.validator ? preg.validator(salida, EXAM_STATE.code) : norm(salida) === norm(preg.expected);
  EXAM_STATE.result = {salida, correcto};
  if (correcto && !EXAM_STATE.aprobadas.includes(EXAM_STATE.idx)) EXAM_STATE.aprobadas.push(EXAM_STATE.idx);
  if (!correcto) EXAM_STATE.tries[EXAM_STATE.idx] = (EXAM_STATE.tries[EXAM_STATE.idx]||0)+1;
  renderExam();
  const ta2 = document.getElementById('exam-editor');
  if (ta2) ta2.value = EXAM_STATE.code;
}

function siguienteExamen() {
  EXAM_STATE.idx++;
  EXAM_STATE.code = STARTER;
  EXAM_STATE.result = null;
  EXAM_STATE.hint = false;
  renderExam();
}

function toggleExamHint() { EXAM_STATE.hint = !EXAM_STATE.hint; renderExam(); const ta=document.getElementById('exam-editor'); if(ta) ta.value=EXAM_STATE.code; }

function onExamInput() {
  const ta = document.getElementById('exam-editor');
  if (!ta) return;
  EXAM_STATE.code = ta.value;
  document.getElementById('exam-line-nums').innerHTML = lineNums(EXAM_STATE.code);
}

function onExamKey(e) {
  const ta = document.getElementById('exam-editor');
  if (!ta) return;
  const ini = ta.selectionStart, fin = ta.selectionEnd;
  if (e.key==='Tab') { e.preventDefault(); ta.setRangeText('    ',ini,fin,'end'); EXAM_STATE.code=ta.value; document.getElementById('exam-line-nums').innerHTML=lineNums(EXAM_STATE.code); return; }
  if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') { e.preventDefault(); ejecutarExamen(); return; }
}

// ═══════════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function render() {
  renderSidebar();
  renderCourse();
  updateHeader();
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCIA
// ═══════════════════════════════════════════════════════════════
function saveState() {
  try {
    localStorage.setItem('pylingo_done', JSON.stringify(STATE.done));
    localStorage.setItem('pylingo_xp', String(Object.keys(STATE.done).length * 10));
  } catch(e) {}
}

function loadState() {
  try {
    const done = localStorage.getItem('pylingo_done');
    if (done) STATE.done = JSON.parse(done);
  } catch(e) {}
}

function resetProgress() {
  if (!confirm('¿Seguro que quieres borrar todo el progreso y empezar de cero?')) return;
  try { localStorage.removeItem('pylingo_done'); } catch(e) {}
  STATE.done = {};
  STATE.streak = 0;
  STATE.idx = 0;
  STATE.code = STARTER;
  STATE.result = null;
  STATE.hint = false;
  STATE.panel = 'explicacion';
  BLOQUES = buildCurriculo();
  CURRICULO = aplanar(BLOQUES);
  render();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
BLOQUES = buildCurriculo();
CURRICULO = aplanar(BLOQUES);
loadState();
render();
</script>
